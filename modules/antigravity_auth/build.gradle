plugins {
    id 'com.android.application' version '8.2.2'
}

android {
    namespace 'com.radriloniuma.auth'
    compileSdk 34

    defaultConfig {
        applicationId "com.radriloniuma.auth"
        minSdk 28
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.biometric:biometric:1.1.0'
}
